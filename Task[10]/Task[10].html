    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 10</title>
    <script>
        function onPageLoad() {

                let dom=document.getElementById('ip-button');
                fetch('https://api.ipify.org/')
                .then(response => response.text())
                .then(data => {
                    dom.innerText = "Your IP is: " + data;
                })
            }
    
    </script>
</head>
<body>
    <button onclick="onPageLoad()" id="ip-button">Get IP </button>
</body>
</html>
