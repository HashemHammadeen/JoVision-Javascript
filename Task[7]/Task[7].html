<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 7</title>
</head>
<body>

    <div id="clock">00:00:00</div>

    <script>
        function updateTime() {
            let now = new Date();

            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();

            if (h < 10) h = "0" + h;
            if (m < 10) m = "0" + m;
            if (s < 10) s = "0" + s;

            let timeString = h + ":" + m + ":" + s;

            document.getElementById("clock").innerText = timeString;
        }

        setInterval(updateTime, 1000);

        updateTime();
    </script>

</body>
</html>
